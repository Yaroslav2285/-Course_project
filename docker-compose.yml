# LR #11: Containerization
# LR #1: Git/CI

networks:
  marketplace:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    container_name: marketplace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe123!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-app_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  python-api:
    build:
      context: ./services/python-api
      dockerfile: Dockerfile
    container_name: marketplace_python_api
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL:-postgresql+asyncpg://app_user:ChangeMe123!@postgres:5432/app_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-supersecretplaceholder}
      PYTHON_API_PORT: ${PYTHON_API_PORT:-8000}
      GO_ESCROW_BASE_URL: ${GO_ESCROW_BASE_URL:-http://go-escrow:8081}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PYTHON_API_PORT:-8000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  go-escrow:
    build:
      context: ./services/go-escrow
      dockerfile: Dockerfile
    container_name: marketplace_go_escrow
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL:-postgresql://app_user:ChangeMe123!@postgres:5432/app_db?sslmode=disable}
      GO_ESCROW_PORT: ${GO_ESCROW_PORT:-8081}
      BLOCKCHAIN_SIM_URL: ${BLOCKCHAIN_SIM_URL:-http://blockchain-sim:8082}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - marketplace

  blockchain-sim:
    build:
      context: ./services/blockchain-sim
      dockerfile: Dockerfile
    container_name: marketplace_blockchain_sim
    restart: unless-stopped
    environment:
      BLOCKCHAIN_SIM_PORT: ${BLOCKCHAIN_SIM_PORT:-8082}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BLOCKCHAIN_SIM_PORT:-8082}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

volumes:
  postgres_data:
    name: marketplace_postgres_data
